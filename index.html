<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirOceans — ID Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c0231e;
  --navy:#1e2266;
  --gold:#c9a84c;
  --card-w:204px;
  --card-h:323px;
}
body{
  font-family:'Inter',sans-serif;
  background:#0d0f1a;
  min-height:100vh;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  padding:36px 20px 80px;
}

/* HEADER */
.site-hdr{text-align:center;margin-bottom:38px;position:relative}
.site-hdr h1{font-size:1.4rem;font-weight:900;letter-spacing:.06em;color:#fff}
.site-hdr h1 span{color:#e84040}
.site-hdr p{font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:.25em;text-transform:uppercase;margin-top:5px}
.hdr-line{width:60px;height:2px;background:linear-gradient(90deg,#c0231e,#1e2266);margin:10px auto 0;border-radius:2px}

.layout{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap;justify-content:center;max-width:1080px;width:100%}

/* FORM */
.form-panel{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:26px 22px;width:340px;flex-shrink:0}
.fsec{font-size:.58rem;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:#e84040;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:6px}
.fsec:first-child{margin-top:0}
.fsec-dot{width:6px;height:6px;border-radius:50%;background:#c0231e;flex-shrink:0}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:3px}
.fld input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:8px 11px;color:#fff;font-family:'Inter',sans-serif;font-size:.78rem;outline:none;transition:border-color .2s,background .2s}
.fld input:focus{border-color:#c0231e;background:rgba(192,35,30,.06)}
.fld input::placeholder{color:rgba(255,255,255,.15)}
.upbox{border:1.5px dashed rgba(255,255,255,.11);border-radius:8px;padding:13px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s,background .2s}
.upbox:hover{border-color:#c0231e;background:rgba(192,35,30,.04)}
.upbox input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upbox .upico{font-size:1.5rem;line-height:1}
.upbox .uptxt{font-size:.6rem;color:rgba(255,255,255,.25);margin-top:3px}
.upbox .upprev{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #c0231e;display:none;margin:0 auto 4px}
.upbox .upprev.sq{border-radius:5px}
.btn-gen{width:100%;margin-top:20px;padding:12px;background:linear-gradient(135deg,#c0231e,#8c1a16);border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-weight:800;font-size:.73rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;box-shadow:0 6px 24px rgba(192,35,30,.35);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.btn-gen::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transition:left .4s}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(192,35,30,.5)}
.btn-gen:hover::before{left:100%}

/* PREVIEW */
.preview-panel{display:flex;flex-direction:column;align-items:center;gap:16px}
.prev-lbl{font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.22)}
.cards-row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:9px}
.card-side-lbl{font-size:.54rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.22)}
.dl-btn{padding:7px 18px;border-radius:7px;font-family:'Inter',sans-serif;font-weight:700;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;transition:transform .14s,opacity .14s}
.dl-btn:hover{transform:translateY(-1px);opacity:.9}
.dl-f{background:#1e2266;color:#fff}
.dl-b{background:#c0231e;color:#fff}
.empty-state{width:var(--card-w);height:var(--card-h);border:1.5px dashed rgba(255,255,255,.07);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.13);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase}
.empty-state .ei{font-size:2.4rem}

/* ═══════════════════════════════
   ID CARD BASE
═══════════════════════════════ */
.id-card{
  width:var(--card-w);
  height:var(--card-h);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  font-family:'Inter',sans-serif;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  flex-shrink:0;
}

/* ══ FRONT ══ */
.card-front{
  background:#f5f6fa;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100%;
  position:relative;
  overflow:hidden;
}

/* Diagonal background graphic — top right corner accent */
.cf-bg-accent{
  position:absolute;
  top:-20px;right:-20px;
  width:110px;height:110px;
  background:#1e2266;
  transform:rotate(35deg);
  z-index:0;
  border-radius:8px;
  opacity:.08;
}
.cf-bg-accent2{
  position:absolute;
  top:-10px;right:-10px;
  width:70px;height:70px;
  background:#c0231e;
  transform:rotate(35deg);
  z-index:0;
  border-radius:5px;
  opacity:.07;
}

/* Bottom wave/arc watermark */
.cf-wm-arc{
  position:absolute;
  bottom:-55px;right:-55px;
  width:170px;height:170px;
  border-radius:50%;
  border:24px solid rgba(30,34,102,.065);
  z-index:0;
}
.cf-wm-arc2{
  position:absolute;
  bottom:-30px;right:-30px;
  width:110px;height:110px;
  border-radius:50%;
  border:16px solid rgba(192,35,30,.08);
  z-index:0;
}
.cf-wm-arc3{
  position:absolute;
  bottom:-80px;right:-80px;
  width:220px;height:220px;
  border-radius:50%;
  border:30px solid rgba(30,34,102,.04);
  z-index:0;
}

/* Subtle dot pattern */
.cf-dots{
  position:absolute;
  bottom:40px;left:8px;
  display:grid;
  grid-template-columns:repeat(4,6px);
  gap:5px;
  z-index:0;
  opacity:.12;
}
.cf-dots span{
  width:3px;height:3px;
  background:#1e2266;
  border-radius:50%;
  display:block;
}

/* ── HEADER STRIP ── */
.cf-top{
  width:100%;
  height:44px;
  position:relative;
  flex-shrink:0;
  overflow:hidden;
  z-index:2;
  display:flex;
}

/* Red angled slice — covers left portion */
.cf-top-red{
  position:absolute;
  left:0;top:0;
  width:98px;height:100%;
  background:white;
  clip-path:polygon(0 0, 86px 0, 100% 100%, 0 100%);
  z-index:1;
}
/* Navy right fill */
.cf-top-navy{
  position:absolute;
  left:0;top:0;right:0;bottom:0;
  background:#1e2266;
  z-index:0;
}
/* Bottom border line */
.cf-top::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,#c0231e 40%,#1e2266 40%);
  z-index:3;
}
/* Logo inside header */
.cf-top .logo-img{
  position:absolute;
  left:8px;top:50%;transform:translateY(-50%);
  height:22px;
  z-index:2;
}
/* Company short name on navy side */
.cf-top .header-tagline{
  position:absolute;
  right:9px;top:50%;transform:translateY(-50%);
  font-size:.38rem;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(255,255,255,.55);
  z-index:2;
  line-height:1.4;
  text-align:right;
}

/* ── PHOTO ── */
.cf-photo-wrap{
  position:relative;
  z-index:3;
  flex-shrink:0;
  margin-top:12px;
}
/* Outer ring = navy */
.cf-photo-outer{
  width:90px;height:90px;
  border-radius:50%;
  border:3px solid #1e2266;
  padding:3px;
  background:#fff;
}
/* Inner ring = red accent */
.cf-photo-ring{
  width:100%;height:100%;
  border-radius:50%;
  overflow:hidden;
  background:#dde;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.cf-photo-ring img{width:100%;height:100%;object-fit:cover}
.cf-photo-ring .ph{font-size:2.2rem;color:rgba(100,100,150,.4)}

/* Small badge on photo — status dot */
.cf-photo-badge{
  position:absolute;
  bottom:0;right:0;
  width:16px;height:16px;
  background:#1e2266;
  border-radius:50%;
  border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
}
.cf-photo-badge-inner{
  width:6px;height:6px;
  background:#4caf50;
  border-radius:50%;
}

/* ── NAME / ROLE ── */
.cf-name{
  font-size:.8rem;font-weight:900;color:#1e2266;
  letter-spacing:.05em;text-transform:uppercase;
  text-align:center;padding:7px 10px 0;line-height:1.2;
  z-index:2;position:relative;
}
.cf-role-wrap{
  text-align:center;margin:5px auto 0;
  position:relative;z-index:2;
}
.cf-role{
  background:#1e2266;color:#fff;
  font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 11px;border-radius:20px;
  display:inline-block;
}

/* ── RED DIVIDER ── */
.cf-divider-wrap{
  display:flex;align-items:center;gap:5px;
  margin:7px auto;
  position:relative;z-index:2;
}
.cf-divider{width:24px;height:1.5px;background:#c0231e;border-radius:2px}
.cf-divider-diamond{
  width:5px;height:5px;
  background:#c0231e;
  transform:rotate(45deg);
  border-radius:1px;
}

/* ── INFO ROWS ── */
.cf-info{
  width:100%;padding:0 13px;
  display:flex;flex-direction:column;gap:4px;
  position:relative;z-index:2;
}
.cf-row{
  display:flex;align-items:center;gap:7px;
  font-size:.58rem;color:#222;
}
.ci{
  width:17px;height:17px;min-width:17px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:8px;flex-shrink:0;
}
.ci-r{background:#c0231e;color:#fff}
.ci-n{background:#1e2266;color:#fff}
.ci-g{background:#1a6e42;color:#fff}
.ci-b{background:#fff;color:#c0231e;border:1px solid #c0231e}

/* ── EMP ID STRIP ── */
.cf-empid-strip{
  width:calc(100% - 22px);
  background:linear-gradient(135deg,rgba(30,34,102,.06),rgba(30,34,102,.03));
  border:1px solid rgba(30,34,102,.14);
  border-left:3px solid #c0231e;
  border-radius:4px;
  padding:4px 10px;
  margin:7px 0 0;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;z-index:2;
}
.cf-empid-lbl{font-size:.48rem;font-weight:700;letter-spacing:.15em;color:#1e2266;text-transform:uppercase;opacity:.55}
.cf-empid-val{font-size:.66rem;font-weight:800;color:#1e2266;letter-spacing:.1em}

/* ── FRONT FOOTER ── */
.cf-footer{
  width:100%;
  margin-top:auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 11px 8px;
  border-top:1px solid rgba(0,0,0,.06);
  flex-shrink:0;
  position:relative;z-index:2;
  background:rgba(255,255,255,.6);
}
.cf-blood{
  font-size:.55rem;font-weight:700;color:#c0231e;
  background:rgba(192,35,30,.07);
  padding:2px 8px;border-radius:3px;
  border:1px solid rgba(192,35,30,.18);
}
.nfc-grp{display:flex;align-items:center;gap:4px}
.nfc-chip{
  width:22px;height:6px;
  background:linear-gradient(135deg,#e8d47a,#b8922c);
  border-radius:2px;border:1px solid rgba(0,0,0,.1);
}
.nfc-lbl{font-size:.44rem;font-weight:700;letter-spacing:.16em;color:#aaa;text-transform:uppercase}
/* Validity tag */
.cf-valid{
  font-size:.44rem;font-weight:700;color:rgba(30,34,102,.5);
  letter-spacing:.06em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
}
.cf-valid-bar{
  width:28px;height:2px;
  background:linear-gradient(90deg,#1e2266,#c0231e);
  border-radius:2px;
}

/* ══ BACK ══ */
.card-back{
  background:#f5f6fa;
  display:flex;flex-direction:column;
  height:100%;position:relative;overflow:hidden;
}

/* Back top — full navy with diagonal cut */
.cb-top{
  width:100%;
  height:44px;
  position:relative;
  flex-shrink:0;
  overflow:hidden;
  z-index:2;
}
.cb-top-navy{
  position:absolute;
  left:0;top:0;right:0;bottom:0;
  background:white;
}
/* Red accent slice — right side */
.cb-top-red{
  position:absolute;
  right:-10px;top:0;
  width:130px;height:100%;
  background:#c0231e;
  clip-path:polygon(18px 0, 100% 0, 100% 100%, 0 100%);
}
.cb-top::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,#1e2266 60%,#c0231e 60%);
  z-index:3;
}
.cb-top .logo-img{
  position:absolute;
  left:9px;top:50%;transform:translateY(-50%);
  height:20px;
  z-index:2;
}
.cb-top .back-label{
  position:absolute;
  right:9px;top:50%;transform:translateY(-50%);
  font-size:.46rem;font-weight:800;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,.8);
  z-index:2;
}

/* Decorative side stripe */
.cb-side-stripe{
  position:absolute;
  left:0;top:44px;bottom:0;
  width:4px;
  background:repeating-linear-gradient(
    to bottom,
    #c0231e 0px,
    #c0231e 8px,
    #1e2266 8px,
    #1e2266 16px
  );
  z-index:1;
}

/* Back watermark circles */
.cb-wm1{
  position:absolute;
  top:-30px;right:-30px;
  width:130px;height:130px;
  border-radius:50%;
  border:20px solid rgba(30,34,102,.05);
  z-index:0;
}
.cb-wm2{
  position:absolute;
  bottom:-40px;left:-40px;
  width:150px;height:150px;
  border-radius:50%;
  border:22px solid rgba(192,35,30,.05);
  z-index:0;
}

/* ── BACK BODY ── */
.cb-body{flex:1;padding:10px 12px 10px 8px;display:flex;flex-direction:column;gap:0;overflow:hidden;position:relative;z-index:2}

.cb-section-title{
  font-size:.5rem;font-weight:800;color:#c0231e;
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:3px;margin-top:9px;
  display:flex;align-items:center;gap:5px;
}
.cb-section-title:first-child{margin-top:0}
.cb-section-dot{width:5px;height:5px;background:#c0231e;border-radius:50%;flex-shrink:0}

.cb-addr{
  font-size:.54rem;color:#333;line-height:1.65;
  padding-left:9px;border-left:2px solid rgba(192,35,30,.2);
}

.cb-hr{
  border:none;
  border-top:1px dashed rgba(0,0,0,.1);
  margin:4px 0;
}

.cb-detail-row{
  display:flex;align-items:baseline;gap:4px;
  font-size:.57rem;margin-bottom:4px;
}
.cbdk{font-weight:700;color:#1e2266;min-width:72px;flex-shrink:0}
.cbdv{color:#444}
.cbdv-id{
  font-size:.6rem;font-weight:800;color:#c0231e;
  background:rgba(192,35,30,.07);
  padding:1px 6px;border-radius:3px;
  border:1px solid rgba(192,35,30,.14);
}

/* ── BACK FOOTER ── */
.cb-footer{
  width:100%;
  background:rgba(255,255,255,.6);
  border-top:1px solid rgba(0,0,0,.06);
  padding:7px 12px 8px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;z-index:2;
}
.cb-qr{
  width:44px;height:44px;
  background:#eee;border-radius:4px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(0,0,0,.07);
}
.cb-qr img{width:100%;height:100%;object-fit:cover}
.cb-qr .qph{font-size:.4rem;color:#bbb;text-align:center;line-height:1.4}
.cb-nfc{display:flex;flex-direction:column;align-items:center;gap:2px}
.cb-nfc-chip{
  width:26px;height:19px;
  background:linear-gradient(135deg,#e8d47a,#b8922c);
  border-radius:3px;border:1px solid rgba(0,0,0,.1);
}
.cb-nfc-lbl{font-size:.4rem;font-weight:700;letter-spacing:.16em;color:#bbb;text-transform:uppercase}
.cb-emerg{text-align:center}
.cb-emerg-lbl{font-size:.42rem;color:#aaa;font-weight:600;letter-spacing:.1em;text-transform:uppercase;display:block}
.cb-emerg-val{font-size:.57rem;font-weight:700;color:#c0231e}

/* Barcode-style deco strip on back */
.cb-barcode{
  display:flex;align-items:stretch;gap:1.5px;
  height:16px;
  margin:0 0 2px;
  opacity:.18;
}
.cb-barcode span{
  background:#1e2266;
  border-radius:1px;
  flex-shrink:0;
}
</style>
</head>
<body>

<div class="site-hdr">
  <h1>Air<span>Oceans</span> Transcontinental</h1>
  <p>Employee ID Card Generator &nbsp;·&nbsp; Portrait CR80</p>
  <div class="hdr-line"></div>
</div>

<div class="layout">

  <!-- FORM -->
  <div class="form-panel">
    <div class="fsec"><span class="fsec-dot"></span>Personal Info</div>
    <div class="fld"><label>Full Name</label><input type="text" id="f-name" placeholder="e.g. VAIBHAV GODHA"></div>
    <div class="fld"><label>Designation</label><input type="text" id="f-role" placeholder="e.g. Director – Sales"></div>
    <div class="fld"><label>Blood Group</label><input type="text" id="f-blood" placeholder="e.g. B+ve"></div>
    <div class="fld"><label>Date of Birth</label><input type="date" id="f-dob"></div>

    <div class="fsec"><span class="fsec-dot"></span>Contact</div>
    <div class="fld"><label>Phone</label><input type="text" id="f-phone" placeholder="+91 XXXXX XXXXX"></div>
    <div class="fld"><label>Email</label><input type="email" id="f-email" placeholder="name@airoceans.com"></div>
    <div class="fld"><label>Website</label><input type="text" id="f-web" placeholder="https://www.airoceans.com/"></div>
    <div class="fld"><label>Emergency Contact</label><input type="text" id="f-emergency" placeholder="+91 XXXXX XXXXX"></div>

    <div class="fsec"><span class="fsec-dot"></span>Employee Record</div>
    <div class="fld"><label>Employee ID</label><input type="text" id="f-empid" placeholder="e.g. E003"></div>
    <div class="fld"><label>Date of Joining</label><input type="date" id="f-doj"></div>
    <div class="fld"><label>Date of Expiry</label><input type="date" id="f-expiry"></div>

    <div class="fsec"><span class="fsec-dot"></span>Media</div>
    <div class="fld">
      <label>Employee Photo</label>
      <div class="upbox">
        <input type="file" id="f-photo" accept="image/*">
        <img class="upprev" id="photoThumb" src="" alt="">
        <div class="upico" id="photoIco">📷</div>
        <div class="uptxt">Click to upload photo</div>
      </div>
    </div>
    </div>

    <button class="btn-gen" onclick="gen()">⚡ Generate ID Card</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="prev-lbl">Preview · Portrait CR80 · 2.125" × 3.375"</div>
    <div id="dlPdfBtn" onclick="dlPDF()" class="dl-btn" style="display:none;background:linear-gradient(135deg,#1e2266,#c0231e);color:#fff;padding:10px 28px;font-size:.72rem;letter-spacing:.14em;border-radius:8px;box-shadow:0 6px 24px rgba(30,34,102,.4);cursor:pointer;border:none;font-family:Inter,sans-serif;font-weight:800;text-transform:uppercase;margin-bottom:8px;">⬇ Download PDF (Both Sides)</div>
    <div class="cards-row" id="cardsRow">
      <div class="empty-state"><div class="ei">🪪</div><div>Fill form &amp; generate</div></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

(function loadLogo(){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const c=document.createElement('canvas');
    c.width=img.naturalWidth;c.height=img.naturalHeight;
    c.getContext('2d').drawImage(img,0,0);
    try{logoB64=c.toDataURL('image/png');}catch(e){}
  };
  img.src='image.png';
})();

document.getElementById('f-photo').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    photoDU=ev.target.result;
    const t=document.getElementById('photoThumb');
    t.src=photoDU;t.style.display='block';
    document.getElementById('photoIco').style.display='none';
  };
  r.readAsDataURL(f);
});



function v(id){return document.getElementById(id).value.trim();}
function fd(d){if(!d)return'—';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`;}

function logoTag(h){
  const s=logoB64||'image.png';
  return`<img class="logo-img" style="height:${h}px;" src="${s}" alt="AirOceans">`;
}

/* Build a random-ish barcode strip */
function barcodeHTML(){
  const widths=[2,1,3,1,2,1,1,2,3,1,2,1,1,3,2,1,2,1,3,1,2,1,1,2];
  return widths.map(w=>`<span style="width:${w}px;"></span>`).join('');
}

  <div class="cf-top">
    <div class="cf-top-navy"></div>
    <div class="cf-top-red"></div>
    ${logoTag(21)}
    <div class="header-tagline"></div>
  </div>

  <!-- photo -->
  <div class="cf-photo-wrap">
    <div class="cf-photo-outer">
      <div class="cf-photo-ring">
        ${photo}
      </div>
    </div>
    <div class="cf-photo-badge"><div class="cf-photo-badge-inner"></div></div>
  </div>

  <!-- name / role -->
  <div class="cf-name">${name.toUpperCase()}</div>
  <div class="cf-role-wrap"><div class="cf-role">${role}</div></div>

  <!-- divider with diamond -->
  <div class="cf-divider-wrap">
    <div class="cf-divider"></div>
    <div class="cf-divider-diamond"></div>
    <div class="cf-divider"></div>
  </div>

  <!-- info -->
  <div class="cf-info">
    <div class="cf-row"><span class="ci ci-r">📞</span>${phone}</div>
    <div class="cf-row"><span class="ci ci-n">✉</span>${email}</div>
    <div class="cf-row"><span class="ci ci-g">🌐</span>${web}</div>
    <div class="cf-row"><span class="ci ci-b">🩸</span>${blood}</div>
  </div>

  <!-- emp id -->
  <div style="display:flex;justify-content:center;width:100%;position:relative;z-index:2;">
    <div class="cf-empid-strip">
      <span class="cf-empid-lbl">Employee ID</span>
      <span class="cf-empid-val">${empid}</span>
    </div>
  </div>

  <!-- footer -->
  <div class="cf-footer">
    <div class="cf-blood">🩸 ${blood}</div>
    <div class="cf-valid">
      <div class="cf-valid-bar"></div>
      <span style="font-size:.42rem;color:rgba(30,34,102,.45);font-weight:700;letter-spacing:.06em;">VALID</span>
    </div>
    <div class="nfc-grp">
      <div class="nfc-chip"></div>
      <span class="nfc-lbl">NFC</span>
    </div>
  </div>
</div>`;

  const back=`
<div class="id-card card-back" id="cardBack">
  <!-- decorations -->
  <div class="cb-wm1"></div>
  <div class="cb-wm2"></div>
  <div class="cb-side-stripe"></div>

  <!-- header -->
  <div class="cb-top">
    <div class="cb-top-navy"></div>
    <div class="cb-top-red"></div>
    ${logoTag(19)}
    <div class="back-label">Staff Card</div>
  </div>

  <!-- body -->
  <div class="cb-body">
    <div class="cb-section-title"><span class="cb-section-dot"></span>Principal Address</div>
    <div class="cb-addr">
      Progressive Tower, Office no.201-203, 2nd Floor,<br>
      15/119 Maharshi Nagar, Pune-411037. MH. India.
    </div>

    <hr class="cb-hr">

    <div class="cb-section-title"><span class="cb-section-dot"></span>Corporate Office</div>
    <div class="cb-addr">
      4th Floor, B-Wing, Heritage House 6,<br>
      Ramabai Ambedkar Road, Pune-411001. MH. India.
    </div>

    <hr class="cb-hr">

    <div class="cb-detail-row"><span class="cbdk">Date of Birth</span><span class="cbdv">${dob}</span></div>
    <div class="cb-detail-row"><span class="cbdk">Employee ID</span><span class="cbdv cbdv-id">${empid}</span></div>
    <div class="cb-detail-row"><span class="cbdk">Date of Joining</span><span class="cbdv">${doj}</span></div>
    <div class="cb-detail-row"><span class="cbdk">Valid Until</span><span class="cbdv">${expiry}</span></div>

    <!-- decorative barcode strip -->
    <div style="margin-top:auto;padding-top:6px;">
      <div class="cb-barcode">${barcodeHTML()}</div>
    </div>
  </div>

  <!-- footer -->
  <div class="cb-footer">
    <div class="cb-nfc">
      <div class="cb-nfc-chip"></div>
      <span class="cb-nfc-lbl">NFC</span>
    </div>
    <div class="cb-emerg">
      <span class="cb-emerg-lbl">Emergency</span>
      <span class="cb-emerg-val">${emerg}</span>
    </div>
    <div class="cb-qr">${qr}</div>
  </div>
</div>`;

  document.getElementById('cardsRow').innerHTML=`
<div class="card-wrap">
  <div class="card-side-lbl">Front</div>
  ${front}
</div>
<div class="card-wrap">
  <div class="card-side-lbl">Back</div>
  ${back}
</div>`;
  // Show the single PDF download button
  document.getElementById('dlPdfBtn').style.display='inline-block';
}

async function dlPDF(){
  const btn=document.getElementById('dlPdfBtn');
  btn.disabled=true; btn.textContent='⏳ Generating PDF...';
  try{
    const {jsPDF}=window.jspdf;
    // CR80 card dimensions in mm: 53.98 × 85.6
    const W=53.98, H=85.6;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[W,H]});
    // --- Front ---
    const front=document.getElementById('cardFront');
    const cvF=await html2canvas(front,{scale:6,useCORS:true,backgroundColor:'#f5f6fa'});
    pdf.addImage(cvF.toDataURL('image/png'),'PNG',0,0,W,H);
    // --- Back ---
    pdf.addPage([W,H],'portrait');
    const back=document.getElementById('cardBack');
    const cvB=await html2canvas(back,{scale:6,useCORS:true,backgroundColor:'#f5f6fa'});
    pdf.addImage(cvB.toDataURL('image/png'),'PNG',0,0,W,H);
    pdf.save('AirOceans-ID-Card.pdf');
  }catch(e){alert('Error generating PDF: '+e.message);}
  btn.disabled=false; btn.textContent='⬇ Download PDF (Both Sides)';
}
</script>
</body>
</html>
